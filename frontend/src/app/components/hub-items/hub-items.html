<div class="hub-container">
<div class="hub-container animation-fade-in">
  <div class="header-section mb-4">
    <h1 class="page-title">Hub Management</h1>
    <p class="text-muted">Consolidated overview of all items across network hubs</p>
  </div>

  <!-- Filters -->
  <div class="filter-card premium-card bg-white p-3 mb-4">
    <div class="row g-3 align-items-end">
      <div class="col-md-3">
        <label class="form-label small">From Date</label>
        <div class="input-group input-group-sm">
          <span class="input-group-text bg-white"><i class="bi bi-calendar3"></i></span>
          <input type="date" class="form-control" [ngModel]="fromDate()" (ngModelChange)="fromDate.set($event)">
        </div>
      </div>
      <div class="col-md-3">
        <label class="form-label small">To Date</label>
        <div class="input-group input-group-sm">
          <span class="input-group-text bg-white"><i class="bi bi-calendar3"></i></span>
          <input type="date" class="form-control" [ngModel]="toDate()" (ngModelChange)="toDate.set($event)">
        </div>
      </div>
      <div class="col-md-4">
        <label class="form-label small">Search Invoice Number / Client</label>
        <div class="input-group input-group-sm">
          <span class="input-group-text bg-white"><i class="bi bi-search"></i></span>
          <input type="text" class="form-control" placeholder="Search..." [ngModel]="searchText()" (ngModelChange)="searchText.set($event)">
        </div>
      </div>
      <div class="col-md-2 text-end">
        <button class="btn btn-primary btn-sm px-4">Search</button>
      </div>
    </div>
  </div>

  <!-- Table -->
  <div class="table-card premium-card bg-white p-0 overflow-hidden">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="bg-light">
          <tr>
            <th class="ps-3">Sl No</th>
            <th>Client Name</th>
            <th>Invoice Number</th>
            <th>Status</th>
            <th>Pcs / Weight</th>
            <th>Employee</th>
            <th>Origin Hub</th>
            <th>Destination</th>
            <th>Staff Amt</th>
            <th>Hub Amt</th>
            <th>Storage Loc</th>
            <th class="text-end pe-3">Action</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let item of filteredItems(); let i = index">
            <td class="ps-3 text-muted">{{ i + 1 }}</td>
            <td class="fw-bold">{{ item.client_name }}</td>
            <td><code>{{ item.invoice_no }}</code></td>
            <td><span [class]="getStatusClass(item.status)">{{ item.status }}</span></td>
          <tr *ngIf="filteredItems().length === 0">
            <td colspan="8" class="text-center py-5">
              <div *ngIf="isLoading()" class="spinner-border text-primary"></div>
              <div *ngIf="!isLoading()" class="text-muted">No hub items found.</div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
